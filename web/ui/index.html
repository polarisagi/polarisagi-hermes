<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>Polaris Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }
    </script>
    <script src="i18n.js"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css" id="flatpickr-dark-theme" disabled>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    <link rel="stylesheet" href="app.css">
    <style type="text/tailwindcss">
        .card {
            @apply bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-700;
        }
    </style>
</head>

<body class="flex h-screen overflow-hidden bg-slate-50 dark:bg-[#0b0f19] text-slate-900 dark:text-slate-100">
    <div id="app" v-cloak class="flex w-full">
        <!-- Sidebar -->
        <div class="w-64 bg-gray-50 dark:bg-slate-900 border-r border-gray-200 dark:border-slate-800 flex flex-col h-full flex-shrink-0">
            <div class="p-6 border-b border-gray-200 dark:border-slate-800">
                <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400">
                    Polaris
                </h1>
                <p class="text-gray-500 dark:text-slate-500 text-xs mt-1 uppercase tracking-wider">{{ t("app_subtitle") }} <span v-if="state.version" class="ml-2 lowercase text-gray-500 dark:text-slate-400 font-mono">{{ state.version }}</span></p>
                
                <!-- 一键更新按钮 -->
                <div v-if="state.updateAvailable" class="mt-4">
                    <button @click="triggerUpdate" class="w-full flex items-center justify-center gap-2 bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-400 hover:to-teal-400 text-white text-xs font-bold py-2 px-3 rounded-lg shadow-[0_0_15px_rgba(16,185,129,0.3)] transition-all transform hover:scale-[1.02]" :disabled="state.isUpdating">
                        <span v-if="!state.isUpdating">{{ t("new_version_found") }} {{ state.latestVersion }}</span>
                        <span v-else class="flex items-center gap-2">
                            <svg class="animate-spin h-3 w-3 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                            {{ t("updating") }}
                        </span>
                    </button>
                </div>
            </div>
            
            <!-- Theme & Lang Switcher -->
            <div class="px-6 py-2 flex items-center justify-between border-b border-gray-200 dark:border-slate-800 text-sm">
                <div class="flex gap-2">
                    <button @click="setTheme('light')" :class="state.theme === 'light' ? 'text-blue-500' : 'text-gray-500 hover:text-gray-900 dark:hover:text-white'">🌞</button>
                    <button @click="setTheme('dark')" :class="state.theme === 'dark' ? 'text-blue-500' : 'text-gray-500 hover:text-gray-900 dark:hover:text-white'">🌙</button>
                    <button @click="setTheme('system')" :class="state.theme === 'system' ? 'text-blue-500' : 'text-gray-500 hover:text-gray-900 dark:hover:text-white'">💻</button>
                </div>
                <div class="flex gap-2 text-gray-500 font-medium">
                    <button @click="setLang('zh')" :class="state.lang === 'zh' ? 'text-blue-500' : 'hover:text-gray-900 dark:hover:text-white'">中</button>
                    <button @click="setLang('en')" :class="state.lang === 'en' ? 'text-blue-500' : 'hover:text-gray-900 dark:hover:text-white'">EN</button>
                </div>
            </div>

            <nav class="flex-1 p-4 space-y-2">
                <a @click="state.currentTab = 'dashboard'" :class="state.currentTab === 'dashboard' ? 'bg-blue-600/20 text-blue-400 border-blue-500/50' : 'text-gray-500 dark:text-slate-400 hover:bg-white dark:bg-slate-800 hover:text-gray-800 dark:text-slate-200 border-transparent'" class="block px-4 py-3 rounded-lg cursor-pointer transition border">
                    <div class="flex items-center gap-3 font-medium">
                        <span>{{ t("tab_dashboard") }}</span>
                    </div>
                </a>
                <a @click="state.currentTab = 'nodes'" :class="state.currentTab === 'nodes' ? 'bg-emerald-600/20 text-emerald-400 border-emerald-500/50' : 'text-gray-500 dark:text-slate-400 hover:bg-white dark:bg-slate-800 hover:text-gray-800 dark:text-slate-200 border-transparent'" class="block px-4 py-3 rounded-lg cursor-pointer transition border">
                    <div class="flex items-center gap-3 font-medium">
                        <span>{{ t("tab_nodes") }}</span>
                    </div>
                </a>
                <a @click="state.currentTab = 'routes'" :class="state.currentTab === 'routes' ? 'bg-pink-600/20 text-pink-400 border-pink-500/50' : 'text-gray-500 dark:text-slate-400 hover:bg-white dark:bg-slate-800 hover:text-gray-800 dark:text-slate-200 border-transparent'" class="block px-4 py-3 rounded-lg cursor-pointer transition border">
                    <div class="flex items-center gap-3 font-medium">
                        <span>{{ t("tab_routes") }}</span>
                    </div>
                </a>
                <a @click="state.currentTab = 'clients'" :class="state.currentTab === 'clients' ? 'bg-indigo-600/20 text-indigo-400 border-indigo-500/50' : 'text-gray-500 dark:text-slate-400 hover:bg-white dark:bg-slate-800 hover:text-gray-800 dark:text-slate-200 border-transparent'" class="block px-4 py-3 rounded-lg cursor-pointer transition border">
                    <div class="flex items-center gap-3 font-medium">
                        <span>{{ t("tab_clients") }}</span>
                    </div>
                </a>
                <a @click="state.currentTab = 'settings'" :class="state.currentTab === 'settings' ? 'bg-purple-600/20 text-purple-400 border-purple-500/50' : 'text-gray-500 dark:text-slate-400 hover:bg-white dark:bg-slate-800 hover:text-gray-800 dark:text-slate-200 border-transparent'" class="block px-4 py-3 rounded-lg cursor-pointer transition border">
                    <div class="flex items-center gap-3 font-medium">
                        <span>{{ t("tab_settings") }}</span>
                    </div>
                </a>
                <a @click="state.currentTab = 'logs'" :class="state.currentTab === 'logs' ? 'bg-amber-600/20 text-amber-400 border-amber-500/50' : 'text-gray-500 dark:text-slate-400 hover:bg-white dark:bg-slate-800 hover:text-gray-800 dark:text-slate-200 border-transparent'" class="block px-4 py-3 rounded-lg cursor-pointer transition border">
                    <div class="flex items-center gap-3 font-medium">
                        <span>{{ t("tab_logs") }}</span>
                    </div>
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto p-8 relative">
            
            <!-- Toast Notification -->
            <div v-if="state.toast.show" class="fixed top-5 right-5 z-[200] flex items-center gap-3 px-5 py-3 rounded-xl shadow-2xl text-white text-sm font-medium pointer-events-none select-none"
                :class="state.toast.type === 'success' ? 'bg-emerald-500/95 ring-1 ring-emerald-400/50' : 'bg-red-500/95 ring-1 ring-red-400/50'">
                <span v-if="state.toast.type === 'success'">✓</span>
                <span v-else>✕</span>
                {{ state.toast.message }}
            </div>

            <!-- Components -->
            <Dashboard></Dashboard>
            <Nodes></Nodes>
            <Routes></Routes>
            <Clients></Clients>
            <Settings></Settings>
            <Logs></Logs>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
