<!DOCTYPE html>
<html lang="zh-CN" x-data :data-theme="$store.global.theme === 'system' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : $store.global.theme">
<head>
    <meta charset="UTF-8">
    <title>Polaris Admin Panel</title>
    <!-- DaisyUI + Tailwind CDN -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.10.1/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Alpine JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- i18n messages -->
    <script src="i18n.js"></script>
    
    <!-- Alpine Store -->
    <script src="store.js"></script>
    
    <!-- Flatpickr -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/zh.js"></script>
    
    <script>
        // Set initial theme setup script (before Alpine loads)
        window.getSystemTheme = () => localStorage.getItem('polaris_theme') || 'system';
        window.applyTheme = (theme) => {
            localStorage.setItem('polaris_theme', theme);
            if (theme === 'system') {
                const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
            } else {
                document.documentElement.setAttribute('data-theme', theme);
            }
        };
        window.getSystemLanguage = () => localStorage.getItem('polaris_lang') || 'zh';
        window.setSystemLanguage = (l) => localStorage.setItem('polaris_lang', l);
    </script>
</head>

<body class="flex h-screen overflow-hidden bg-base-200" x-init="
    fetch('/api/admin/info')
        .then(r => r.json())
        .then(d => {
            $store.global.version = d.version;
            $store.global.debugEnabled = d.debug;
            $store.global.checkForUpdates(d.version);
        })
        .catch(e => console.error(e));
">
    <!-- Toast Notification -->
    <div class="toast toast-top toast-end z-[200]" x-show="$store.global.toast.show" x-transition>
        <div class="alert shadow-lg" :class="$store.global.toast.type === 'success' ? 'alert-success' : 'alert-error'">
            <span x-text="$store.global.toast.message"></span>
        </div>
    </div>

    <!-- Sidebar Layout using DaisyUI Drawer/Menu -->
    <div class="drawer lg:drawer-open">
        <input id="my-drawer-2" type="checkbox" class="drawer-toggle" />
        
        <!-- Main Content -->
        <div class="drawer-content flex flex-col p-8 relative h-screen overflow-auto">
            <!-- Mobile drawer toggle -->
            <label for="my-drawer-2" class="btn btn-primary drawer-button lg:hidden mb-4">☰ Menu</label>
            
            <!-- Dynamic Components Container -->
            <div id="components-container"></div>
            
        </div> 
        
        <!-- Sidebar -->
        <div class="drawer-side">
            <label for="my-drawer-2" aria-label="close sidebar" class="drawer-overlay"></label> 
            <div class="menu w-64 min-h-full bg-base-100 text-base-content border-r border-base-300 flex flex-col pt-6">
                <!-- Branding -->
                <div class="px-6 mb-4">
                    <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-primary to-success">
                        Polaris
                    </h1>
                    <p class="text-xs mt-1 uppercase tracking-wider opacity-60">
                        <span x-text="$store.global.t('app_subtitle')"></span>
                        <span x-show="$store.global.version" class="ml-2 lowercase font-mono" x-text="$store.global.version"></span>
                    </p>
                    
                    <!-- Update Button -->
                    <button class="btn btn-success btn-sm w-full mt-4" 
                            x-show="$store.global.updateAvailable" 
                            @click="$store.global.triggerUpdate()"
                            :disabled="$store.global.isUpdating">
                        <span x-show="!$store.global.isUpdating" x-text="$store.global.t('new_version_found') + ' ' + $store.global.latestVersion"></span>
                        <span x-show="$store.global.isUpdating" class="loading loading-spinner loading-xs"></span>
                        <span x-show="$store.global.isUpdating" x-text="$store.global.t('updating')"></span>
                    </button>
                </div>
                
                <!-- Theme & Lang & Pro Mode Switcher -->
                <div class="px-6 py-4 border-y border-base-300 text-sm space-y-3">
                    <div class="flex items-center justify-between">
                        <div class="flex gap-2">
                            <button class="btn btn-ghost btn-xs px-1" @click="$store.global.setTheme('light')" :class="$store.global.theme === 'light' ? 'text-primary' : 'opacity-50'">🌞</button>
                            <button class="btn btn-ghost btn-xs px-1" @click="$store.global.setTheme('dark')" :class="$store.global.theme === 'dark' ? 'text-primary' : 'opacity-50'">🌙</button>
                            <button class="btn btn-ghost btn-xs px-1" @click="$store.global.setTheme('system')" :class="$store.global.theme === 'system' ? 'text-primary' : 'opacity-50'">💻</button>
                        </div>
                        <div class="flex gap-2 font-medium">
                            <button class="btn btn-ghost btn-xs px-1" @click="$store.global.setLang('zh')" :class="$store.global.lang === 'zh' ? 'text-primary' : 'opacity-50'">中</button>
                            <button class="btn btn-ghost btn-xs px-1" @click="$store.global.setLang('en')" :class="$store.global.lang === 'en' ? 'text-primary' : 'opacity-50'">EN</button>
                        </div>
                    </div>
                    
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-medium opacity-60" :class="$store.global.proMode ? 'text-primary' : ''" x-text="$store.global.proMode ? $store.global.t('pro_mode') : $store.global.t('simple_mode')"></span>
                        <input type="checkbox" class="toggle toggle-primary toggle-sm" :checked="$store.global.proMode" @click="$store.global.toggleProMode()" />
                    </div>
                </div>
                
                <!-- Nav Links -->
                <ul class="menu w-full px-4 mt-2 gap-1 flex-1">
                    <li><a @click="$store.global.currentTab = 'dashboard'" :class="{'active': $store.global.currentTab === 'dashboard'}" x-text="$store.global.t('tab_dashboard')"></a></li>
                    <li><a @click="$store.global.currentTab = 'channels'" :class="{'active': $store.global.currentTab === 'channels'}" x-text="$store.global.t('tab_nodes')"></a></li>
                    <li x-show="$store.global.proMode"><a @click="$store.global.currentTab = 'rules'" :class="{'active': $store.global.currentTab === 'rules'}" x-text="$store.global.t('tab_routes')"></a></li>
                    <li><a @click="$store.global.currentTab = 'clients'" :class="{'active': $store.global.currentTab === 'clients'}" x-text="$store.global.t('tab_clients')"></a></li>
                    <li><a @click="$store.global.currentTab = 'settings'" :class="{'active': $store.global.currentTab === 'settings'}" x-text="$store.global.t('tab_settings')"></a></li>
                    <li><a @click="$store.global.currentTab = 'logs'" :class="{'active': $store.global.currentTab === 'logs'}" x-text="$store.global.t('tab_logs')"></a></li>
                </ul>
            </div>
        </div>
    </div>
    
    <!-- Alpine JS App Script -->
    <script type="module" src="app.js"></script>
</body>
</html>
