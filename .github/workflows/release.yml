name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '>=1.26.0'

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
        LDFLAGS="-s -w -X 'polaris-hermes/internal/config.Version=${VERSION}' -X 'polaris-hermes/internal/webapi.Version=${VERSION}'"

        BINARY_NAME=polaris-hermes
        if [ "${{ matrix.goos }}" = "windows" ]; then
          BINARY_NAME=polaris-hermes-windows-${{ matrix.goarch }}.exe
        else
          BINARY_NAME=polaris-hermes-${{ matrix.goos }}-${{ matrix.goarch }}
        fi
        go build -ldflags="${LDFLAGS}" -o $BINARY_NAME ./cmd/polaris

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: polaris-hermes-${{ matrix.goos }}-${{ matrix.goarch }}
        path: polaris-hermes-*
        retention-days: 1

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
