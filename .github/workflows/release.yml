name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '>=1.26.0'

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
      run: |
        VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
        LDFLAGS="-s -w -X 'polaris-gateway/internal/webapi.Version=${VERSION}'"

        BINARY_NAME=polaris-gateway
        if [ "${{ matrix.goos }}" = "windows" ]; then
          BINARY_NAME=polaris-gateway-windows-${{ matrix.goarch }}.exe
        else
          BINARY_NAME=polaris-gateway-${{ matrix.goos }}-${{ matrix.goarch }}
        fi
        go build -ldflags="${LDFLAGS}" -o $BINARY_NAME ./cmd/polaris

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: polaris-gateway-*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
